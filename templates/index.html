<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Government Schemes &amp; Jobs Eligibility Form</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="page">
    <div class="card">
      <h1>Government Schemes &amp; Jobs Eligibility Check</h1>
      <p class="subtitle">Fill in your details below to see government schemes and job opportunities you may be eligible for.</p>

      {% if errors %}
        <div class="alert alert-error">
          <strong>Please fix the following:</strong>
          <ul>
            {% for error in errors %}
              <li>{{ error }}</li>
            {% endfor %}
          </ul>
        </div>
      {% endif %}

      <form action="{{ url_for('recommend') }}" method="POST" id="eligibility-form" novalidate>

        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input type="text" id="full_name" name="full_name" placeholder="e.g. Swetha Reddy"
                 value="{{ form_data.get('full_name', '') }}" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" max="100" placeholder="e.g. 23"
                   value="{{ form_data.get('age', '') }}" required>
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
              <option value="" disabled {% if not form_data.get('gender') %}selected{% endif %}>Select gender</option>
              {% for g in genders %}
                <option value="{{ g }}" {% if form_data.get('gender') == g %}selected{% endif %}>{{ g }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="state">State</label>
            <select id="state" name="state" required>
              <option value="" disabled {% if not form_data.get('state') %}selected{% endif %}>Select state</option>
              {% for s in states %}
                <option value="{{ s }}" {% if form_data.get('state') == s %}selected{% endif %}>{{ s }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label for="education">Education</label>
            <select id="education" name="education" required>
              <option value="" disabled {% if not form_data.get('education') %}selected{% endif %}>Select education level</option>
              {% for e in educations %}
                <option value="{{ e }}" {% if form_data.get('education') == e %}selected{% endif %}>{{ e }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="occupation">Occupation</label>
            <select id="occupation" name="occupation" required>
              <option value="" disabled {% if not form_data.get('occupation') %}selected{% endif %}>Select occupation</option>
              {% for o in occupations %}
                <option value="{{ o }}" {% if form_data.get('occupation') == o %}selected{% endif %}>{{ o }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label for="annual_income">Annual Income (\u20b9)</label>
            <input type="number" id="annual_income" name="annual_income" min="0" step="1" placeholder="e.g. 200000"
                   value="{{ form_data.get('annual_income', '') }}" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="" disabled {% if not form_data.get('category') %}selected{% endif %}>Select category</option>
              {% for c in categories %}
                <option value="{{ c }}" {% if form_data.get('category') == c %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label for="disability">Disability</label>
            <select id="disability" name="disability" required>
              <option value="" disabled {% if not form_data.get('disability') %}selected{% endif %}>Select an option</option>
              {% for d in disabilities %}
                <option value="{{ d }}" {% if form_data.get('disability') == d %}selected{% endif %}>{{ d }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary">Check Eligibility</button>
      </form>
    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
